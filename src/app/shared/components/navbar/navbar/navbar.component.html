<header class="w-full bg-white shadow-sm px-4 py-3 flex items-center justify-between">
  <!-- LEFT -->
  <div class="flex items-center gap-4">
    <!-- Logo -->
    <div class="flex items-center gap-2">
      <img src="/assets/images/logo.png" alt="" />
      <span class="font-bold text-lg">Cliniva</span>
    </div>

    <!-- Menu Button -->
    <button (click)="toggleMenu()" class="p-2 rounded hover:bg-gray-100">☰</button>
  </div>

  <!-- RIGHT -->
  <div class="flex items-center gap-4">
    <!-- Fullscreen -->
    <button class="p-2 hover:bg-gray-100 rounded">⛶</button>

    <!-- Notifications -->
    <div class="relative">
      <button class="p-2 hover:bg-gray-100 rounded">🔔</button>
      <span class="absolute top-0 right-0 bg-red-500 text-white text-xs px-1 rounded-full">
        3
      </span>
    </div>

    <!-- User -->
    <div class="flex items-center gap-2">
      <img src="https://i.pravatar.cc/40" class="w-8 h-8 rounded-full" />
      <span class="text-sm font-medium">Ella Jones</span>
    </div>
  </div>
</header>
